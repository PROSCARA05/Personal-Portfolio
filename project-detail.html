    <button id="back-to-top" class="back-to-top" aria-label="Back to top">

    <script>
        // Dark Mode Toggle
        const darkModeToggle = document.getElementById('darkModeToggle');
        if (darkModeToggle) {
            const darkMode = localStorage.getItem('darkMode') === 'enabled';
            if (darkMode) {
                document.body.classList.add('dark-mode');
                darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
            darkModeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                if (document.body.classList.contains('dark-mode')) {
                    localStorage.setItem('darkMode', 'enabled');
                    darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                } else {
                    localStorage.setItem('darkMode', 'disabled');
                    darkModeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                }
            });
        }
        
        // Reading Progress Bar
        const progressBar = document.querySelector('.reading-progress-bar');
        if (progressBar) {
            window.addEventListener('scroll', () => {
                const windowHeight = window.innerHeight;
                const documentHeight = document.documentElement.scrollHeight;
                const scrollTop = window.scrollY;
                const progress = (scrollTop / (documentHeight - windowHeight)) * 100;
                progressBar.style.width = `${Math.min(progress, 100)}%`;
            });
        }
        
        // Back to Top Button
        const backToTop = document.getElementById('back-to-top');
        if (backToTop) {
            window.addEventListener('scroll', () => {
                backToTop.style.display = window.scrollY > 300 ? 'flex' : 'none';
            });
            backToTop.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
        
        // Mobile Navigation
        const navToggle = document.querySelector('.nav-toggle');
        const navMenu = document.querySelector('.nav-menu');
        if (navToggle) {
            navToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                navMenu.classList.toggle('active');
            });
        }
        document.addEventListener('click', (e) => {
            if (navMenu && navMenu.classList.contains('active') && 
                !navMenu.contains(e.target) && !navToggle.contains(e.target)) {
                navMenu.classList.remove('active');
            }
        });
        
        // Navbar scroll effect
        const navbar = document.querySelector('.navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 100) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
        
        // Project Data
        const projects = {
            'ai-data-analysis': {
                title: 'AI-Powered Data Analysis Tool',
                date: '2024',
                version: 'v1.0.0',
                readtime: '5 min read',
                github: 'https://github.com/PROSCARA05/ai-data-analysis',
                demo: '#',
                icon: 'fa-chart-line',
                content: `

                        <h2>Overview</h2>
                        <p>The AI-Powered Data Analysis Tool is a comprehensive Python application designed to automate data cleaning, exploration, and machine learning model training. It provides an intuitive interface for data scientists and analysts to quickly gain insights from their datasets without writing complex code.</p>
                    </div>
                    <div class="project-section">
                        <h2>Key Features</h2>
                        <ul class="feature-list">
                            <li>Automated data cleaning and preprocessing</li>
                            <li>Interactive data visualization with matplotlib and seaborn</li>
                            <li>Multiple machine learning models (Linear Regression, Random Forest, Decision Tree)</li>
                            <li>Feature importance analysis for model interpretability</li>
                            <li>Export results to CSV and JSON formats</li>
                            <li>Batch processing for large datasets up to 1M rows</li>
                        </ul>
                    </div>
                    <div class="project-section">
                        <h2>Technologies Used</h2>
                        <div class="tech-stack">
                            <span class="tech-badge">Python 3.9+</span>
                            <span class="tech-badge">pandas</span>
                            <span class="tech-badge">NumPy</span>
                            <span class="tech-badge">scikit-learn</span>
                            <span class="tech-badge">matplotlib</span>
                            <span class="tech-badge">seaborn</span>
                        </div>
                    </div>
                    <div class="project-section">
                        <h2>Code Example</h2>
                        <div class="code-block"><pre>from data_analyzer import DataAnalyzer

analyzer = DataAnalyzer()
analyzer.load_data('dataset.csv')
analyzer.clean_data()
analyzer.explore_data()
analyzer.visualize_data()
model = analyzer.train_models(target_column='sales')
prediction = analyzer.make_prediction(input_data)</pre></div>
                    </div>
                    <div class="project-section">
                        <h2>Results & Impact</h2>
                        <p>The tool successfully processes datasets of up to 1 million rows, reducing analysis time by approximately 70% compared to manual methods. The Random Forest model achieves an average R² score of 0.85 on test data, providing reliable predictions for business decision-making.</p>
                    </div>
                `
            },
            'data-manipulation': {

                version: 'v1.0.0',

                demo: '#',
                icon: 'fa-database',

                    </div>

                        <h2>Code Example</h2>

                    </div>
                    <div class="project-section">
                        <h2>Results & Impact</h2>
                        <p>The toolkit reduces data preprocessing time by up to 60% and has been successfully used to process datasets from various domains including sales, customer analytics, and sensor data.</p>
                    </div>
                `
            },
            'calculator': {
                title: 'Interactive Scientific Calculator',
                date: '2024',

                github: 'https://github.com/PROSCARA05/scientific-calculator',
                demo: '#',
                icon: 'fa-calculator',
                content: `
                    <div class="project-section">
                        <h2>Overview</h2>

            'portfolio': {

                icon: 'fa-portrait',
                content: `
                    <div class="project-section">
                        <h2>Overview</h2>
                        <p>A modern, responsive portfolio website showcasing my skills, projects, and professional experience. Features include dark mode, interactive animations, and a fully responsive design that works on all devices.</p>
                    </div>

                        <h2>Key Features</h2>
                        <ul class="feature-list">
                            <li>Fully responsive design for mobile, tablet, and desktop</li>

                        </ul>
                    </div>
                    <div class="project-section">
                        <h2>Technologies Used</h2>
                        <div class="tech-stack">
                            <span class="tech-badge">HTML5</span>
                            <span class="tech-badge">CSS3</span>
                            <span class="tech-badge">JavaScript</span>
                            <span class="tech-badge">Font Awesome</span>
                            <span class="tech-badge">Google Fonts</span>

                    </div>
                    <div class="project-section">

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id') || 'ai-data-analysis';
        const project = projects[projectId];
        
        if (project) {
            document.getElementById('project-title').textContent = project.title;
            document.getElementById('project-date').textContent = project.date;
            document.getElementById('project-version').textContent = project.version;
            document.getElementById('project-readtime').textContent = project.readtime;
            document.getElementById('project-content').innerHTML = project.content;
            document.getElementById('github-link').href = project.github;
            document.getElementById('demo-link').href = project.demo;
            document.title = project.title + ' | Karabo Nkadimeng';
            
            const iconElement = document.querySelector('#project-image i');
            if (iconElement) iconElement.className = 'fas ' + project.icon;
        }
    </script>
