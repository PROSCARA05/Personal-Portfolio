import pandas as pd
import numpy as np
from sklearn.model_selection import train_test_split
from sklearn.preprocessing import StandardScaler, LabelEncoder
from sklearn.ensemble import RandomForestClassifier
from sklearn.linear_model import LogisticRegression
from sklearn.metrics import accuracy_score, classification_report

class LoanRiskPredictor:
    def __init__(self, data_path):
        self.data = pd.read_csv(data_path)
        self.model = None
        self.scaler = StandardScaler()
        
    def preprocess_data(self):
        # Handle missing values
        self.data.fillna({
            'Credit_History': self.data['Credit_History'].mode()[0],
            'LoanAmount': self.data['LoanAmount'].median()
        }, inplace=True)
        
        # Feature engineering
        self.data['Debt_Income_Ratio'] = self.data['LoanAmount'] / self.data['ApplicantIncome']
        
        # Encode categorical variables
        le = LabelEncoder()
        self.data['Property_Area'] = le.fit_transform(self.data['Property_Area'])
        self.data['Education'] = le.fit_transform(self.data['Education'])
        
        return self.data
    
    def train_model(self, model_type='random_forest'):
        features = ['ApplicantIncome', 'LoanAmount', 'Credit_History', 
                   'Debt_Income_Ratio', 'Property_Area', 'Education']
        X = self.data[features]
        y = self.data['Loan_Status']
        
        X_scaled = self.scaler.fit_transform(X)
        X_train, X_test, y_train, y_test = train_test_split(
            X_scaled, y, test_size=0.2, random_state=42
        )
        
        if model_type == 'random_forest':
            self.model = RandomForestClassifier(n_estimators=100, random_state=42)
        else:
            self.model = LogisticRegression(random_state=42)
            
        self.model.fit(X_train, y_train)
        y_pred = self.model.predict(X_test)
        accuracy = accuracy_score(y_test, y_pred)
        
        print(f"Model Accuracy: {accuracy:.2%}")
        print(classification_report(y_test, y_pred))
        
        return self.model, accuracy

# Usage
predictor = LoanRiskPredictor('loan_data.csv')
predictor.preprocess_data()
model, accuracy = predictor.train_model('random_forest')</pre></div>

                        <p style="margin-top: 15px;"><i class="fas fa-lightbulb" style="color: #f59e0b;"></i> <em>This project demonstrates skills relevant to the SARB's focus on data-driven decision making in the financial sector.</em></p>
                    </div>
                    <div class="project-section">
                        <h2>Links</h2>
                        <p><i class="fab fa-github"></i> <a href="https://github.com/PROSCARA05/Financial-Risk-Prediction-ML" target="_blank">View Source Code on GitHub</a></p>
                    </div>
                `
            }
        };
        
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id') || 'portfolio';
        const project = projects[projectId];
        
        if (project) {
            document.getElementById('project-title').textContent = project.title;
            document.getElementById('project-date').textContent = project.date;
            document.getElementById('project-version').textContent = project.version;
            document.getElementById('project-readtime').textContent = project.readtime;
            document.getElementById('project-content').innerHTML = project.content;
            
            const githubBtn = document.getElementById('github-link');
            if (project.github) {
                githubBtn.href = project.github;
                githubBtn.style.display = 'inline-flex';
            } else {
                githubBtn.style.display = 'none';
            }
            
            const demoBtn = document.getElementById('demo-link');
            if (project.demo) {
                demoBtn.style.display = 'inline-flex';
                demoBtn.href = project.demo;
            } else {
                demoBtn.style.display = 'none';
            }
            
            document.title = project.title + ' | Karabo Nkadimeng';
            
            const iconElement = document.querySelector('#project-image i');
            if (iconElement) iconElement.className = 'fas ' + project.icon;
        } else {
            // Handle invalid project ID
            document.getElementById('project-title').textContent = 'Project Not Found';
            document.getElementById('project-content').innerHTML = '<p>Sorry, the requested project could not be found. <a href="index.html#projects">Return to projects</a>.</p>';
            document.getElementById('github-link').style.display = 'none';
        }
    </script>
</body>
</html>
